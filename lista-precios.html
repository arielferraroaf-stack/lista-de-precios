<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans,sans-serif);background:var(--color-background-tertiary);color:var(--color-text-primary);font-size:15px}
.tabs{display:flex;border-bottom:0.5px solid var(--color-border-tertiary);background:var(--color-background-primary);position:sticky;top:0;z-index:10}
.tab{flex:1;padding:12px 8px;text-align:center;font-size:14px;cursor:pointer;border:none;background:transparent;color:var(--color-text-secondary);border-bottom:2px solid transparent;transition:all .2s}
.tab.active{color:var(--color-text-primary);font-weight:500;border-bottom:2px solid var(--color-text-primary)}
.view{display:none;padding:12px}
.view.active{display:block}

/* CONSULTA */
.search-box{background:var(--color-background-primary);border-radius:var(--border-radius-lg);border:0.5px solid var(--color-border-tertiary);padding:16px;margin-bottom:12px}
.search-box label{font-size:13px;color:var(--color-text-secondary);display:block;margin-bottom:6px}
.search-row{display:flex;gap:8px}
.search-row input{flex:1;font-size:16px;padding:10px 12px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);background:var(--color-background-secondary);color:var(--color-text-primary)}
.search-row button{padding:10px 16px;border-radius:var(--border-radius-md);font-size:14px;white-space:nowrap}
.result-card{background:var(--color-background-primary);border-radius:var(--border-radius-lg);border:0.5px solid var(--color-border-tertiary);padding:20px;text-align:center;display:none}
.result-card.found{display:block}
.result-card.notfound{display:block;color:var(--color-text-danger)}
.result-name{font-size:18px;font-weight:500;margin-bottom:4px}
.result-cat{font-size:13px;color:var(--color-text-secondary);margin-bottom:16px}
.result-price{font-size:36px;font-weight:500;color:var(--color-text-success)}
.result-code{font-size:12px;color:var(--color-text-tertiary);margin-top:8px;font-family:var(--font-mono,monospace)}
.result-stock{display:inline-block;margin-top:8px;font-size:12px;padding:3px 10px;border-radius:var(--border-radius-md);background:var(--color-background-success);color:var(--color-text-success)}
.img-placeholder{width:80px;height:80px;border-radius:var(--border-radius-md);background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);margin:0 auto 12px;display:flex;align-items:center;justify-content:center;color:var(--color-text-tertiary);font-size:12px}

/* LISTA */
.filter-row{display:flex;gap:8px;margin-bottom:12px}
.filter-row input{flex:1;font-size:14px;padding:8px 12px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);background:var(--color-background-secondary);color:var(--color-text-primary)}
.filter-row select{font-size:13px;padding:8px 10px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);background:var(--color-background-secondary);color:var(--color-text-primary)}
.prod-card{background:var(--color-background-primary);border-radius:var(--border-radius-lg);border:0.5px solid var(--color-border-tertiary);padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;gap:12px}
.prod-img{width:48px;height:48px;border-radius:var(--border-radius-md);background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);flex-shrink:0;display:flex;align-items:center;justify-content:center;color:var(--color-text-tertiary);font-size:10px}
.prod-info{flex:1;min-width:0}
.prod-name{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.prod-cat{font-size:12px;color:var(--color-text-secondary)}
.prod-code{font-size:11px;color:var(--color-text-tertiary);font-family:var(--font-mono,monospace)}
.prod-price{font-size:16px;font-weight:500;color:var(--color-text-success);flex-shrink:0}
.count{font-size:12px;color:var(--color-text-secondary);margin-bottom:8px}

/* CARGA */
.form-card{background:var(--color-background-primary);border-radius:var(--border-radius-lg);border:0.5px solid var(--color-border-tertiary);padding:16px;margin-bottom:12px}
.form-card h3{font-size:15px;font-weight:500;margin-bottom:14px}
.field{margin-bottom:12px}
.field label{font-size:12px;color:var(--color-text-secondary);display:block;margin-bottom:4px}
.field input,.field select{width:100%;font-size:14px;padding:9px 12px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);background:var(--color-background-secondary);color:var(--color-text-primary)}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.btn-add{width:100%;padding:11px;font-size:14px;font-weight:500;background:var(--color-background-success);color:var(--color-text-success);border:0.5px solid var(--color-border-success);border-radius:var(--border-radius-md);cursor:pointer}
.btn-del{background:none;border:none;color:var(--color-text-danger);cursor:pointer;font-size:13px;padding:2px 6px}
.msg{font-size:13px;padding:8px 12px;border-radius:var(--border-radius-md);margin-bottom:10px;display:none}
.msg.ok{background:var(--color-background-success);color:var(--color-text-success);display:block}
.msg.err{background:var(--color-background-danger);color:var(--color-text-danger);display:block}
.export-btn{width:100%;padding:10px;font-size:13px;color:var(--color-text-secondary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);background:var(--color-background-secondary);cursor:pointer;margin-top:4px}
</style>

<h2 class="sr-only" style="position:absolute;width:1px;height:1px;overflow:hidden">Plantilla de lista de precios con consulta por código de barras</h2>

<div class="tabs">
  <button class="tab active" onclick="showTab('consulta')"><i class="ti ti-barcode" aria-hidden="true"></i><br>Consulta</button>
  <button class="tab" onclick="showTab('lista')"><i class="ti ti-list" aria-hidden="true"></i><br>Lista</button>
  <button class="tab" onclick="showTab('carga')"><i class="ti ti-plus" aria-hidden="true"></i><br>Cargar</button>
</div>

<!-- CONSULTA -->
<div class="view active" id="view-consulta">
  <div class="search-box">
    <label>Ingresá el código de barras del producto</label>
    <div class="search-row">
      <input type="text" id="input-codigo" placeholder="Ej: 7790001234567" inputmode="numeric" onkeydown="if(event.key==='Enter')buscar()">
      <button onclick="buscar()"><i class="ti ti-search" aria-hidden="true"></i> Buscar</button>
    </div>
  </div>
  <div class="result-card" id="result-box">
    <div class="img-placeholder" id="res-img"><i class="ti ti-photo" style="font-size:24px" aria-hidden="true"></i></div>
    <div class="result-name" id="res-nombre"></div>
    <div class="result-cat" id="res-cat"></div>
    <div class="result-price" id="res-precio"></div>
    <div class="result-code" id="res-code"></div>
    <div class="result-stock" id="res-stock"></div>
  </div>
</div>

<!-- LISTA -->
<div class="view" id="view-lista">
  <div class="filter-row">
    <input type="text" id="filtro-nombre" placeholder="Buscar nombre..." oninput="renderLista()">
    <select id="filtro-cat" onchange="renderLista()"><option value="">Todas</option></select>
  </div>
  <div class="count" id="count-label"></div>
  <div id="lista-container"></div>
</div>

<!-- CARGA -->
<div class="view" id="view-carga">
  <div class="form-card">
    <h3><i class="ti ti-package" aria-hidden="true"></i> Nuevo producto</h3>
    <div id="msg-carga" class="msg"></div>
    <div class="field">
      <label>Código de barras *</label>
      <input type="text" id="f-codigo" placeholder="7790001234567" inputmode="numeric">
    </div>
    <div class="field">
      <label>Nombre del producto *</label>
      <input type="text" id="f-nombre" placeholder="Ej: Arroz Largo Fino 1kg">
    </div>
    <div class="field-row">
      <div class="field">
        <label>Categoría</label>
        <input type="text" id="f-cat" placeholder="Ej: Almacén" list="cat-list">
        <datalist id="cat-list"></datalist>
      </div>
      <div class="field">
        <label>Precio *</label>
        <input type="number" id="f-precio" placeholder="0.00" min="0" step="0.01">
      </div>
    </div>
    <div class="field">
      <label>URL de imagen (opcional)</label>
      <input type="text" id="f-img" placeholder="https://...">
    </div>
    <button class="btn-add" onclick="agregarProducto()"><i class="ti ti-check" aria-hidden="true"></i> Guardar producto</button>
  </div>
  <button class="export-btn" onclick="exportarCSV()"><i class="ti ti-download" aria-hidden="true"></i> Exportar CSV (abrir en Excel)</button>
  <button class="export-btn" style="margin-top:6px" onclick="importarCSV()"><i class="ti ti-upload" aria-hidden="true"></i> Importar CSV</button>
  <input type="file" id="file-input" accept=".csv" style="display:none" onchange="leerCSV(this)">
</div>

<script>
let productos = JSON.parse(localStorage.getItem('lp_productos') || 'null') || [
  {codigo:'7790001000001',nombre:'Arroz Largo Fino 1kg',categoria:'Almacén',precio:1850,img:''},
  {codigo:'7790001000002',nombre:'Aceite Girasol 1.5L',categoria:'Almacén',precio:3200,img:''},
  {codigo:'7790001000003',nombre:'Yerba Mate 1kg',categoria:'Infusiones',precio:2750,img:''},
  {codigo:'7790001000004',nombre:'Fideos Spaghetti 500g',categoria:'Almacén',precio:980,img:''},
  {codigo:'7790001000005',nombre:'Leche Entera 1L',categoria:'Lácteos',precio:1100,img:''},
];

function guardar(){localStorage.setItem('lp_productos',JSON.stringify(productos))}

function showTab(t){
  document.querySelectorAll('.tab').forEach((el,i)=>el.classList.remove('active'));
  document.querySelectorAll('.view').forEach(el=>el.classList.remove('active'));
  const tabs=['consulta','lista','carga'];
  document.querySelectorAll('.tab')[tabs.indexOf(t)].classList.add('active');
  document.getElementById('view-'+t).classList.add('active');
  if(t==='lista')renderLista();
  if(t==='carga')actualizarDatalist();
}

function fmt(n){return '$'+Number(n).toLocaleString('es-AR',{minimumFractionDigits:2,maximumFractionDigits:2})}

function buscar(){
  const cod=document.getElementById('input-codigo').value.trim();
  const box=document.getElementById('result-box');
  box.className='result-card';
  if(!cod)return;
  const p=productos.find(x=>x.codigo===cod);
  if(!p){
    box.className='result-card notfound';
    box.innerHTML='<i class="ti ti-alert-circle" style="font-size:32px;margin-bottom:8px" aria-hidden="true"></i><div style="font-size:15px">Producto no encontrado</div><div style="font-size:13px;margin-top:4px;color:var(--color-text-secondary)">Código: '+cod+'</div>';
    return;
  }
  box.className='result-card found';
  document.getElementById('res-img').innerHTML=p.img?`<img src="${p.img}" style="width:80px;height:80px;object-fit:contain;border-radius:var(--border-radius-md)" alt="${p.nombre}">`:'<i class="ti ti-photo" style="font-size:24px" aria-hidden="true"></i>';
  document.getElementById('res-nombre').textContent=p.nombre;
  document.getElementById('res-cat').textContent=p.categoria||'Sin categoría';
  document.getElementById('res-precio').textContent=fmt(p.precio);
  document.getElementById('res-code').textContent='Cód: '+p.codigo;
  document.getElementById('res-stock').textContent='Disponible';
}

function renderLista(){
  const txt=document.getElementById('filtro-nombre').value.toLowerCase();
  const cat=document.getElementById('filtro-cat').value;
  const cats=[...new Set(productos.map(p=>p.categoria).filter(Boolean))].sort();
  const sel=document.getElementById('filtro-cat');
  const cur=sel.value;
  sel.innerHTML='<option value="">Todas</option>'+cats.map(c=>`<option value="${c}"${c===cur?' selected':''}>${c}</option>`).join('');
  const filtrados=productos.filter(p=>
    (!txt||p.nombre.toLowerCase().includes(txt)||p.codigo.includes(txt))&&
    (!cat||p.categoria===cat)
  );
  document.getElementById('count-label').textContent=filtrados.length+' producto'+(filtrados.length!==1?'s':'');
  document.getElementById('lista-container').innerHTML=filtrados.map((p,i)=>`
    <div class="prod-card">
      <div class="prod-img">${p.img?`<img src="${p.img}" style="width:48px;height:48px;object-fit:contain;border-radius:var(--border-radius-md)" alt="">`:'<i class="ti ti-photo" aria-hidden="true"></i>'}</div>
      <div class="prod-info">
        <div class="prod-name">${p.nombre}</div>
        <div class="prod-cat">${p.categoria||'—'}</div>
        <div class="prod-code">${p.codigo}</div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px">
        <div class="prod-price">${fmt(p.precio)}</div>
        <button class="btn-del" onclick="eliminar('${p.codigo}')" aria-label="Eliminar"><i class="ti ti-trash" aria-hidden="true"></i></button>
      </div>
    </div>`).join('');
}

function eliminar(cod){
  if(!confirm('¿Eliminar este producto?'))return;
  productos=productos.filter(p=>p.codigo!==cod);
  guardar();renderLista();
}

function actualizarDatalist(){
  const cats=[...new Set(productos.map(p=>p.categoria).filter(Boolean))];
  document.getElementById('cat-list').innerHTML=cats.map(c=>`<option value="${c}">`).join('');
}

function agregarProducto(){
  const msg=document.getElementById('msg-carga');
  msg.className='msg';
  const cod=document.getElementById('f-codigo').value.trim();
  const nom=document.getElementById('f-nombre').value.trim();
  const cat=document.getElementById('f-cat').value.trim();
  const pre=parseFloat(document.getElementById('f-precio').value);
  const img=document.getElementById('f-img').value.trim();
  if(!cod||!nom||isNaN(pre)||pre<0){
    msg.className='msg err';msg.textContent='Completá código, nombre y precio.';return;
  }
  if(productos.find(p=>p.codigo===cod)){
    msg.className='msg err';msg.textContent='Ya existe un producto con ese código.';return;
  }
  productos.push({codigo:cod,nombre:nom,categoria:cat,precio:pre,img});
  guardar();
  ['f-codigo','f-nombre','f-cat','f-precio','f-img'].forEach(id=>document.getElementById(id).value='');
  msg.className='msg ok';msg.textContent='Producto guardado correctamente.';
  setTimeout(()=>msg.className='msg',2500);
  actualizarDatalist();
}

function exportarCSV(){
  const header='codigo,nombre,categoria,precio,imagen';
  const rows=productos.map(p=>[p.codigo,'"'+p.nombre+'"','"'+(p.categoria||'')+'"',p.precio,'"'+(p.img||'')+'"'].join(','));
  const blob=new Blob([header+'\n'+rows.join('\n')],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download='lista_precios.csv';a.click();
}

function importarCSV(){document.getElementById('file-input').click()}

function leerCSV(input){
  const file=input.files[0];if(!file)return;
  const r=new FileReader();
  r.onload=e=>{
    const lines=e.target.result.split('\n').slice(1);
    let cnt=0;
    lines.forEach(line=>{
      if(!line.trim())return;
      const cols=line.split(',').map(c=>c.replace(/^"|"$/g,'').trim());
      if(cols.length<4)return;
      const [codigo,nombre,categoria,precio,img='']=cols;
      if(!codigo||!nombre||isNaN(parseFloat(precio)))return;
      if(productos.find(p=>p.codigo===codigo))return;
      productos.push({codigo,nombre,categoria,precio:parseFloat(precio),img});cnt++;
    });
    guardar();
    alert(cnt+' productos importados.');
    actualizarDatalist();
    input.value='';
  };
  r.readAsText(file,'utf-8');
}
</script>
